<style>
*{box-sizing:border-box;margin:0;padding:0}
.login-screen{position:fixed;inset:0;background:#f5f4f0;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.login-screen.hidden{display:none}
.login-box{background:#fff;border:1px solid #e0dfd8;border-radius:16px;padding:40px;text-align:center;width:340px;max-width:90vw;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.login-box h2{font-size:18px;font-weight:700;margin-bottom:6px}
.login-box p{font-size:13px;color:#888;margin-bottom:28px}
.login-btn{width:100%;padding:13px;border-radius:10px;border:1px solid #d0cfc8;background:#faf9f6;cursor:pointer;font-size:15px;font-weight:600;margin-bottom:10px;transition:all .15s;color:#1a1a1a}
.login-btn:hover{background:#f0efe8;border-color:#bbb}
.login-btn.mat{background:#eaf1fe;border-color:#aac4f5;color:#1a6ef5}
.login-btn.mat:hover{background:#d6e7ff}
.login-btn.ign{background:#edf7f1;border-color:#a8dcc0;color:#1a7a4a}
.login-btn.ign:hover{background:#d5f0e0}
.sync-status{font-size:11px;color:#aaa;display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#aaa;display:inline-block}
.sync-dot.ok{background:#1a7a4a}
.sync-dot.syncing{background:#f0a500;animation:pulse .8s infinite}
.sync-dot.error{background:#c0392b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;min-height:100vh}
.topbar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid #e0dfd8;background:#fff;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:600;flex:1}
.topbar-actions{display:flex;gap:6px;flex-wrap:wrap}
.nav{display:flex;gap:4px;padding:10px 20px;border-bottom:1px solid #e0dfd8;background:#faf9f6;flex-wrap:wrap}
.nav button{padding:7px 14px;border-radius:8px;border:1px solid transparent;background:transparent;cursor:pointer;font-size:13px;color:#666}
.nav button.active{background:#fff;border-color:#d0cfc8;color:#1a1a1a;font-weight:500}
.nav button:hover:not(.active){background:#fff}
.main{padding:20px;max-width:1400px;width:100%;margin:0 auto}
.section{display:none}.section.active{display:block}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:18px;margin-bottom:14px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:#aaa;margin-top:2px}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #d0cfc8;background:transparent;cursor:pointer;font-size:13px;color:#1a1a1a;transition:all .15s}
.btn:hover{background:#f5f4f0}
.btn-primary{background:#1a6ef5;color:#fff;border-color:transparent}.btn-primary:hover{background:#1560d8}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:#c0392b;border-color:transparent}.btn-danger:hover{background:#fdf0ef}
.btn-success{color:#1a7a4a;border-color:transparent}.btn-success:hover{background:#edf7f1}
.btn-edit{color:#555;border-color:transparent}.btn-edit:hover{background:#f5f4f0}
.btn-export{background:#edf7f1;color:#1a7a4a;border:1px solid #b8e6cc;font-size:12px;padding:6px 12px;font-weight:500}
.btn-import{background:#fff8ec;color:#b07d1a;border:1px solid #f0d898;font-size:12px;padding:6px 12px;font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
@media(max-width:900px){.grid4,.grid5{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid2,.grid3,.grid4,.grid5{grid-template-columns:1fr}}
.metric{background:#f5f4f0;border-radius:8px;padding:14px}
.metric-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.metric-value{font-size:20px;font-weight:600}
.green{color:#1a7a4a}.red{color:#c0392b}.blue{color:#1a6ef5}.gold{color:#8a6400}.gray{color:#888}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px;border-bottom:1px solid #e0dfd8;color:#888;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:8px;border-bottom:1px solid #f0efe8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f6}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#edf7f1;color:#1a7a4a}
.badge-red{background:#fdf0ef;color:#c0392b}
.badge-amber{background:#fff8ec;color:#b07d1a}
.badge-blue{background:#eaf1fe;color:#1a6ef5}
.badge-gray{background:#f0efe8;color:#666}
.badge-gold{background:#fdf6dc;color:#8a6400}
.badge-purple{background:#f3effe;color:#6c3fc5}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:540px;max-width:96vw;border:1px solid #e0dfd8;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-hint{font-size:12px;color:#aaa;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.form-row input,.form-row select{width:100%;padding:8px 11px;border-radius:8px;border:1px solid #d0cfc8;background:#faf9f6;color:#1a1a1a;font-size:13px;font-family:inherit}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#1a6ef5;background:#fff}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid #f0efe8}
.empty{padding:28px;text-align:center;color:#bbb;font-size:13px}
.row-actions{display:flex;gap:4px;flex-wrap:wrap}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;border-radius:8px;padding:11px 18px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.btn-undo{background:#fff;color:#555;border:1px solid #d0cfc8;font-size:12px;padding:6px 12px;font-weight:500;opacity:.5;cursor:not-allowed;transition:all .15s}
.btn-undo.active{opacity:1;cursor:pointer;color:#1a6ef5;border-color:#1a6ef5}
.btn-undo.active:hover{background:#eaf1fe}
.undo-badge{display:inline-block;background:#1a6ef5;color:#fff;border-radius:10px;font-size:10px;padding:0 5px;margin-left:4px;font-weight:700;min-width:16px;text-align:center}
.tc-bar{background:#fdf6dc;border:1px solid #f0d898;border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tc-bar label{font-size:12px;color:#8a6400;font-weight:500}
.tc-bar input{width:110px;padding:6px 10px;border-radius:6px;border:1px solid #f0d898;background:#fff;font-size:13px}
.tab-bar{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid #e0dfd8;flex-wrap:wrap}
.tab-btn{padding:8px 16px;font-size:13px;cursor:pointer;color:#888;border:none;background:none;border-bottom:2px solid transparent}
.tab-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.saldo-card{border-radius:10px;padding:14px}
.saldo-pos{background:#edf7f1;border:1px solid #b8e6cc}
.saldo-neg{background:#fdf0ef;border:1px solid #f5c0b8}
.socio-mat{color:#1a6ef5;font-weight:600}
.socio-ign{color:#6c3fc5;font-weight:600}
.fp-ef{display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600;background:#fff8ec;color:#b07d1a;border:1px solid #f0d898}
.fp-tr{display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600;background:#eaf1fe;color:#1a6ef5;border:1px solid #c0d8fa}
hr.sep{border:none;border-top:1px solid #f0efe8;margin:14px 0}
.interno-row td{background:#f9f6ff}
.interno-row:hover td{background:#f3effe}
.badge-teal{background:#e6f7f5;color:#0d7a6e}
.hon-section{border-left:3px solid #e0dfd8;padding-left:14px;margin-bottom:18px}
.hon-section-proyecto{border-left-color:#1a6ef5}
.hon-section-direccion{border-left-color:#6c3fc5}
.hon-section-construccion{border-left-color:#1a7a4a}
.hon-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;color:#555}
.cuota-pagada td{opacity:.7}
.cuota-pagada td:first-child{text-decoration:none}
.progress-bar-bg{background:#f0efe8;border-radius:4px;height:6px;width:100%;margin-top:6px}
.progress-bar-fill{height:6px;border-radius:4px;background:#1a6ef5;transition:width .3s}

/* ── PRINT / PDF ─────────────────────────────── */
@media print{
  body{background:#fff!important;font-size:12px}
  .topbar,.nav,.modal-bg,.toast,.btn,.row-actions,button{display:none!important}
  .main{padding:0!important;max-width:100%!important}
  .section{display:none!important}
  .section.active{display:block!important}
  #print-area{display:block!important}
  .print-header{display:flex!important}
  .no-print{display:none!important}
  table{border-collapse:collapse;width:100%;font-size:11px}
  th,td{border:1px solid #ccc;padding:5px 8px;text-align:left}
  th{background:#f5f5f5;font-weight:600}
  .metric{border:1px solid #ddd!important;background:#fff!important}
  .badge{border:1px solid #ccc!important;background:#f5f5f5!important;color:#333!important;padding:1px 5px!important}
  @page{margin:18mm 14mm;size:A4}
}
#print-area{display:none}
.print-header{display:none;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #1a1a1a}
.print-logo{font-size:18px;font-weight:700;color:#1a1a1a}
.print-sub{font-size:12px;color:#888;margin-top:3px}
.print-fecha{font-size:11px;color:#aaa;text-align:right}
/* Logo: el fondo negro del logo se hace transparente en impresión */
@media print { 
  .logo-print-img { filter: none !important; }
  .print-border-line { border-bottom: 2px solid #1a1a1a !important; }
}

// ── FERIADOS ARGENTINA (nacionales fijos + movibles conocidos) ──────────────
function getFeriadosAR(anio){
  // Feriados fijos por mes-dia
  const fijos=[
    '01-01','03-03','03-24','04-02','05-01','05-25','06-20','07-09','08-17','10-12','11-20','12-08','12-25'
  ];
  // Feriados movibles y puentes conocidos por año (YYYY-MM-DD)
  const movibles={
    2025:['2025-03-03','2025-03-04','2025-04-17','2025-04-18','2025-04-21','2025-06-16','2025-11-21','2025-12-26'],
    2026:['2026-02-16','2026-02-17','2026-03-23','2026-04-02','2026-04-03','2026-06-22','2026-10-09','2026-12-07'],
    2027:['2027-02-08','2027-02-09','2027-03-23','2027-04-01','2027-04-02','2027-10-08','2027-11-19']
  };
  const set=new Set();
  fijos.forEach(f=>set.add(anio+'-'+f));
  (movibles[anio]||[]).forEach(f=>set.add(f));
  return set;
}
function diasHabilesHasta(fechaStr){
  if(!fechaStr)return null;
  // Validar formato YYYY-MM-DD completo antes de procesar
  if(!/^\d{4}-\d{2}-\d{2}$/.test(fechaStr))return null;
  const anioNum=parseInt(fechaStr.slice(0,4));
  // Rechazar años fuera de rango razonable (evita loops enormes)
  if(anioNum<2020||anioNum>2040)return null;
  const hoy=new Date();
  hoy.setHours(0,0,0,0);
  const fin=new Date(fechaStr+'T00:00:00');
  fin.setHours(0,0,0,0);
  if(isNaN(fin.getTime()))return null;
  if(fin.getTime()===hoy.getTime())return 0;
  const yMin=Math.min(hoy.getFullYear(),fin.getFullYear());
  const yMax=Math.max(hoy.getFullYear(),fin.getFullYear());
  const feriados=new Set();
  for(let y=yMin;y<=yMax;y++){const s=getFeriadosAR(y);s.forEach(f=>feriados.add(f));}
  let dias=0;
  const cur=new Date(hoy);
  const signo=fin>=hoy?1:-1;
  let guard=0;
  while(guard++<3650){
    cur.setDate(cur.getDate()+signo);
    const dw=cur.getDay();
    const iso=cur.toISOString().slice(0,10);
    if(dw!==0&&dw!==6&&!feriados.has(iso))dias++;
    if(cur.getTime()===fin.getTime())break;
  }
  return dias*signo;
}
function badgeDiasHabiles(fechaStr){
  if(!fechaStr)return '';
  const dias=diasHabilesHasta(fechaStr);
  if(dias===null)return '';
  const abs=Math.abs(dias);
  let color,bg,txt;
  if(dias<0){color='#c0392b';bg='#fdf0ef';txt='Venció hace '+abs+' día'+(abs===1?'':'s');}
  else if(dias===0){color='#c0392b';bg='#fdf0ef';txt='¡Hoy!';}
  else if(dias<=5){color='#b07d1a';bg='#fff8ec';txt=dias+' día'+(dias===1?'':'s') + ' hábil'+(dias===1?'':'es');}
  else if(dias<=15){color='#8a6400';bg='#fdf6dc';txt=dias+' días hábiles';}
  else{color='#1a7a4a';bg='#edf7f1';txt=dias+' días hábiles';}
  return `<div style="margin-top:4px;display:inline-block;background:${bg};color:${color};border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap">⏱ ${txt}</div>`;
}

const MAX_UNDO = 3;
let undoStack = [];

function updateUndoBtn(){
  const btn = $('btn-undo');
  const badge = $('undo-badge');
  if(!btn) return;
  if(undoStack.length > 0){
    btn.classList.add('active');
    badge.style.display = 'inline-block';
    badge.textContent = undoStack.length;
  } else {
    btn.classList.remove('active');
    badge.style.display = 'none';
  }
}

function undoAction(){
  if(!undoStack.length) return;
  const prev = undoStack.pop();
  data = JSON.parse(prev);
  updateUndoBtn();
  renderSection(currentSection);
  save();
  showToast('↩ Cambio deshecho (' + (undoStack.length) + ' restante' + (undoStack.length===1?'':'s') + ')');
}

function save(){
  // Guardar snapshot ANTES de sobreescribir (máx 3)
  try{
    const snap = localStorage.getItem('estudio_v5');
    if(snap){
      undoStack.push(snap);
      if(undoStack.length > MAX_UNDO) undoStack.shift();
    }
  }catch(e){}
  updateUndoBtn();
  // Guardar en Supabase (async, no bloquea la UI)
  saveToSupabase();
}
function load(){
  // Fallback offline: cargar desde localStorage

}

      const si=recibidoSocioObra(o.id,IGN)-pagadoSocioObra(o.id,IGN);
      const dif=pc-(cc+mo);
      return`<tr>

  mc.innerHTML=`<h2>Presupuesto del rubro</h2>
    <div style="font-size:15px;font-weight:700;color:#1a6ef5;margin-bottom:4px">👷 ${rubro}</div>

      </div>
      <div style="background:#fdf0ef;border:2px solid #c0392b;border-radius:10px;padding:14px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#c0392b;margin-bottom:6px">🔧 COSTO DEL PROVEEDOR</div>
        <div style="font-size:11px;color:#555;margin-bottom:8px">Lo que vos le pagás al gremio/proveedor. Calculado automáticamente de los movimientos cargados.</div>
        <div style="font-size:18px;font-weight:700;color:#c0392b;padding:8px 11px;background:#fff;border-radius:8px;border:2px solid #c0392b">${fmtARS(costoReal)}</div>
        <div style="font-size:10px;color:#aaa;margin-top:4px">Se actualiza automáticamente al cargar pagos en "👷 Caja MO"</div>
      </div>
    </div>

    ${montoCliente&&costoReal?`<div style="background:${ganancia>=0?'#edf7f1':'#fdf0ef'};border:2px solid ${ganancia>=0?'#1a7a4a':'#c0392b'};border-radius:10px;padding:12px;margin-bottom:14px;text-align:center">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:${ganancia>=0?'#1a7a4a':'#c0392b'};margin-bottom:4px">💵 TU GANANCIA EN ESTE RUBRO</div>
      <div style="font-size:24px;font-weight:700;color:${ganancia>=0?'#1a7a4a':'#c0392b'}">${ganancia>=0?'+':''}${fmtARS(ganancia)}</div>
      <div style="font-size:11px;color:#888;margin-top:2px">Precio cliente − Costo proveedor</div>
    </div>`:''}

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      ${existing?`<button class="btn btn-danger" onclick="borrarPresupRubro(${oid},'${rubro.replace(/'/g,"\'")}')">Borrar</button>`:''}
      <button class="btn btn-primary" onclick="savePresupRubro(${oid},'${rubro.replace(/'/g,"\'")}')">Guardar precio cliente</button>
    </div>`;
  bg.classList.add('open');
}

function savePresupRubro(oid, rubro){
  if(!data.presupuesto_rubros)data.presupuesto_rubros=[];
  const monto=parseFloat(document.getElementById('pr-monto-cliente').value)||0;
  const idx=data.presupuesto_rubros.findIndex(p=>p.obraId===oid&&p.rubro===rubro);
  if(idx>=0){data.presupuesto_rubros[idx].monto=monto;}
  else{data.presupuesto_rubros.push({obraId:oid,rubro,monto});}
  save();closeModal();renderSubTabMO();showToast('✓ Precio al cliente guardado');
}

function borrarPresupRubro(oid, rubro){
  if(!confirm('¿Eliminar el presupuesto de este rubro?'))return;
  data.presupuesto_rubros=(data.presupuesto_rubros||[]).filter(p=>!(p.obraId===oid&&p.rubro===rubro));
  save();closeModal();renderSubTabMO();showToast('Eliminado');
}

function renderSubTabHon(){
  const el=$('caja-detalle'); if(!el||!cajaObraId)return;
  const oid=cajaObraId;
  const tablas=(data.tablasHon||[]).filter(t=>t.obraId===oid);
  const tipoInfo={proyecto:'Proyecto',direccion:'Dirección de obra',construccion:'Construcción'};

  if(!tablas.length){
    el.innerHTML=html+'<div class="empty">No hay honorarios registrados para esta obra. Usá la sección "Tabla de honorarios".</div>';
    return;
  }

  tablas.forEach(t=>{
    const cuotas=t.cuotas||[];
    const fmt=t.moneda==='USD'?fmtUSD:fmtARS;
    const cobrado=cuotas.filter(c=>c.pagado).reduce((a,c)=>a+c.monto,0);
    const pendiente=cuotas.filter(c=>!c.pagado).reduce((a,c)=>a+c.monto,0);
    const pct=cuotas.length?Math.round(cuotas.filter(c=>c.pagado).length/cuotas.length*100):0;
    const pos=cobrado>0;

    let rowsHon='';
    cuotas.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(c=>{
      rowsHon+=`<tr style="${c.pagado?'background:#f0faf3;opacity:.85':''}">
        <td style="font-weight:500">${c.nombre}</td>
        <td style="text-align:right;font-weight:600">${fmt(c.monto)}</td>
        <td>${c.fecha}</td>
        <td style="font-weight:600;color:${c.pagado?'#1a7a4a':'#c0392b'}">${c.pagado?'✓ Cobrado':'Pendiente'}</td>
        <td>${c.formaPago||'—'}</td>
        <td style="color:#aaa">${c.fechaPago||'—'}</td>
        <td><button class="btn btn-sm ${c.pagado?'btn-danger':'btn-success'}" onclick="toggleCuota(${t.id},${c.id})">${c.pagado?'Desmarcar':'Marcar cobrado'}</button></td>
      </tr>`;
    });

    html+=`<div style="background:#f3effe;border:1px solid #d8ccf5;border-radius:12px;padding:16px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6c3fc5">${tipoInfo[t.tipo]||t.tipo} · ${t.moneda}</div>
          <div style="font-size:14px;font-weight:600;margin-top:3px">${t.desc}</div>
          <div style="font-size:11px;color:#888;margin-top:2px">Matias ${t.porcMat||50}% · Ignacio ${t.porcIgn||50}%</div>
        </div>
        <div style="text-align:right;font-size:12px">
          <div style="color:#1a7a4a;font-weight:600">Cobrado: ${fmt(cobrado)}</div>
          <div style="color:#c0392b;font-weight:600">Pendiente: ${fmt(pendiente)}</div>
          <div style="color:#888;margin-top:4px">${pct}% cobrado</div>
          <div style="background:#f0efe8;border-radius:4px;height:6px;width:120px;margin-top:4px;margin-left:auto"><div style="height:6px;border-radius:4px;background:#6c3fc5;width:${pct}%"></div></div>
        </div>
      </div>
      <div style="overflow-x:auto"><table style="font-size:12px"><thead><tr>
        <th>Concepto</th><th style="text-align:right">Monto</th><th>Vencimiento</th><th>Estado</th><th>F.Cobro</th><th>Fecha cobro</th><th></th>
      </tr></thead><tbody>${rowsHon}</tbody></table></div>

  });

  el.innerHTML=html;

function toggleCuota(tablaId,cuotaId){
  const tabla=(data.tablasHon||[]).find(t=>t.id===tablaId);
  if(!tabla)return;
  const cuota=(tabla.cuotas||[]).find(c=>c.id===cuotaId);
  if(!cuota)return;
  cuota.pagado=!cuota.pagado;
  cuota.fechaPago=cuota.pagado?today():'';
  save();renderSubTabHon();showToast(cuota.pagado?'✓ Marcado como cobrado':'Desmarcado');
}

    <div class="form-row2">
      <div class="form-row"><label>Monto ($)</label><input id="pd-monto" type="number" value="${m.monto||''}"></div>
      <div class="form-row"><label>Forma de pago</label><select id="pd-fp">${FPS.map(f=>`<option${(m.formaPago||'')==f?' selected':''}>${f}</option>`).join('')}</select></div>
    </div>

      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="savePagoDirecto(${oid},${editId||'null'})">Guardar</button>
    </div>`;
  bg.classList.add('open');
}

function savePagoDirecto(oid,editId){
  if(!data.pagos_directos)data.pagos_directos=[];
  const obj={
    obraId:oid, fecha:gv('pd-fecha'), proveedor:gv('pd-prov'),
    categoria:gv('pd-cat'), rubro:gv('pd-rubro'), desc:gv('pd-desc'),
    monto:parseFloat(gv('pd-monto'))||0,
    formaPago:gv('pd-fp'), obs:gv('pd-obs')
  };
  if(editId){
    const idx=data.pagos_directos.findIndex(p=>p.id===editId);
    if(idx>=0)data.pagos_directos[idx]={...data.pagos_directos[idx],...obj};
  } else {
    obj.id=data.nextId.pagodirecto++;
    data.pagos_directos.push(obj);
  }
  save();closeModal();renderSubTabPagosDirect();showToast('✓ Pago directo guardado');
}

function delPagoDirecto(id){
  if(!confirm('¿Eliminar este pago directo?'))return;
  data.pagos_directos=(data.pagos_directos||[]).filter(p=>p.id!==id);
  save();renderSubTabPagosDirect();showToast('Eliminado');
}

// ── SUB-TAB GASTO X RUBRO (Caja Chica + Pagos Directos) ────────
function renderSubTabGastoRubro(){
  const el=$('caja-detalle'); if(!el||!cajaObraId)return;
  const oid=cajaObraId;

  const gastosCC=data.caja.filter(m=>m.obraId===oid&&m.tipo==='caja_chica');
  const porRubroCC={};
  gastosCC.forEach(m=>{const r=(m.rubro&&m.rubro!=='Caja chica')?m.rubro:'Sin clasificar';porRubroCC[r]=(porRubroCC[r]||0)+m.monto;});

  const gastosMO=data.caja.filter(m=>m.obraId===oid&&m.tipo==='mano_obra');
  const porRubroMO={};
  gastosMO.forEach(m=>{const r=m.rubro||'Sin clasificar';porRubroMO[r]=(porRubroMO[r]||0)+m.monto;});

  const pagosDir=(data.pagos_directos||[]).filter(p=>p.obraId===oid);
  const porRubroPD={};
  pagosDir.forEach(p=>{const r=p.rubro||'Sin clasificar';porRubroPD[r]=(porRubroPD[r]||0)+p.monto;});

  const getPresupGasto=rubro=>{
    const p=(data.presupuesto_gasto_rubro||[]).find(p=>p.obraId===oid&&p.rubro===rubro);
    return p?p.monto:0;
  };

  const todosRubros=[...new Set([
    ...Object.keys(porRubroCC),
    ...Object.keys(porRubroMO),
    ...Object.keys(porRubroPD),
    ...(data.presupuesto_gasto_rubro||[]).filter(p=>p.obraId===oid).map(p=>p.rubro)
  ])].sort();

  const totalCCsum=Object.values(porRubroCC).reduce((a,v)=>a+v,0);
  const totalMOsum=Object.values(porRubroMO).reduce((a,v)=>a+v,0);
  const totalPDsum=Object.values(porRubroPD).reduce((a,v)=>a+v,0);
  const totalGeneral=totalCCsum+totalMOsum+totalPDsum;
  const totalPresupuestado=todosRubros.reduce((a,r)=>a+getPresupGasto(r),0);
  const totalDiferencia=totalPresupuestado-totalGeneral;

  let rows='';
  todosRubros.forEach(r=>{
    const cc=porRubroCC[r]||0;
    const mo=porRubroMO[r]||0;
    const pd=porRubroPD[r]||0;
    const tot=cc+mo+pd;
    const presup=getPresupGasto(r);
    const dif=presup-tot;
    const hayPresup=presup>0;
    rows+=`<tr>
      <td><strong>${r}</strong></td>
      <td style="text-align:right;color:#8a6400">${fmtARS(cc)}</td>
      <td style="text-align:right;color:#1a6ef5">${fmtARS(mo)}</td>
      <td style="text-align:right;color:#0d7a6e">${fmtARS(pd)}</td>
      <td style="text-align:right;font-weight:700;color:#b3541e">${fmtARS(tot)}</td>
      <td style="text-align:right;color:#555">${hayPresup?fmtARS(presup):'—'}</td>
      <td style="text-align:right;font-weight:600;color:${!hayPresup?'#aaa':(dif>=0?'#1a7a4a':'#c0392b')}">${hayPresup?(dif>=0?'+':'')+fmtARS(dif):'—'}</td>
      <td><button class="btn btn-sm btn-edit" onclick="openModalPresupGasto(${oid},'${r.replace(/'/g,"\\'")}')">${hayPresup?'✏':'+'}</button></td>
    </tr>`;
  });

  const rubrosDisponibles=[...new Set([...getRubrosCC(),...RUBROS_MO])].filter(r=>!todosRubros.includes(r));
  const addBtnsGasto=rubrosDisponibles.length
    ?`<div style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center"><span style="font-size:11px;color:#aaa">Presupuestar rubro:</span>${rubrosDisponibles.map(r=>`<button class="btn btn-sm" style="background:#fdf3ec;color:#b3541e;border:1px solid #f0c898;font-size:11px" onclick="openModalPresupGasto(${oid},'${r.replace(/'/g,"\\'")}')">+ ${r}</button>`).join('')}</div>`
    :'';

  el.innerHTML=`
  <div style="background:#fdf3ec;border:1px solid #f0c898;border-radius:12px;padding:16px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      <div>
        <div style="font-size:13px;font-weight:700;color:#b3541e">📊 Gasto real por rubro</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px">Caja Chica + Mano de Obra + Pagos directos del cliente, sumados por rubro, vs. lo presupuestado</div>
      </div>
      <button class="btn btn-sm" style="background:#f5f4f0;border:1px solid #d0cfc8" onclick="imprimirGastoRubro(${oid})">🖨 PDF para el cliente</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div class="metric" style="flex:1;min-width:120px;background:#fff8ec;border:1px solid #f0d898">
        <div class="metric-label" style="color:#8a6400">Caja Chica</div>
        <div class="metric-value gold" style="font-size:17px">${fmtARS(totalCCsum)}</div>
      </div>
      <div class="metric" style="flex:1;min-width:120px;background:#eaf1fe;border:1px solid #c0d8fa">
        <div class="metric-label" style="color:#1a6ef5">Mano de Obra</div>
        <div class="metric-value" style="color:#1a6ef5;font-size:17px">${fmtARS(totalMOsum)}</div>
      </div>
      <div class="metric" style="flex:1;min-width:120px;background:#e6f7f5;border:1px solid #9dd9d2">
        <div class="metric-label" style="color:#0d7a6e">Pagos directos</div>
        <div class="metric-value" style="color:#0d7a6e;font-size:17px">${fmtARS(totalPDsum)}</div>
      </div>
      <div class="metric" style="flex:1;min-width:120px;background:#fdf3ec;border:2px solid #b3541e">
        <div class="metric-label" style="color:#b3541e">Gasto total</div>
        <div class="metric-value" style="color:#b3541e;font-size:19px">${fmtARS(totalGeneral)}</div>
      </div>
      <div class="metric" style="flex:1;min-width:120px;background:#f5f4f0;border:1px solid #d0cfc8">
        <div class="metric-label">Presupuestado</div>
        <div class="metric-value" style="font-size:19px">${fmtARS(totalPresupuestado)}</div>
      </div>
      <div class="metric" style="flex:1;min-width:120px;background:${totalDiferencia>=0?'#f0faf3':'#fdf0ef'};border:2px solid ${totalDiferencia>=0?'#1a7a4a':'#c0392b'}">
        <div class="metric-label" style="color:${totalDiferencia>=0?'#1a7a4a':'#c0392b'}">Diferencia</div>
        <div class="metric-value ${totalDiferencia>=0?'green':'red'}" style="font-size:19px">${totalDiferencia>=0?'+':''}${fmtARS(totalDiferencia)}</div>
      </div>
    </div>
    ${addBtnsGasto}
    ${todosRubros.length?`<div style="overflow-x:auto"><table style="font-size:12px"><thead><tr>
      <th>Rubro</th><th style="text-align:right">Caja Chica</th><th style="text-align:right">Mano de Obra</th><th style="text-align:right">Pagos directos</th><th style="text-align:right">Total gastado</th><th style="text-align:right">Presupuestado</th><th style="text-align:right">Diferencia</th><th></th>
    </tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">Sin gastos registrados todavía para esta obra.</div>'}
  </div>`;
}

function openModalPresupGasto(oid, rubro){
  const bg=$('modal-bg'),mc=$('modal-content');
  const existing=(data.presupuesto_gasto_rubro||[]).find(p=>p.obraId===oid&&p.rubro===rubro);
  mc.innerHTML=`<h2>Presupuesto del rubro</h2>
    <div style="font-size:15px;font-weight:700;color:#b3541e;margin-bottom:12px">📊 ${rubro}</div>
    <div class="form-row"><label>Monto presupuestado ($)</label><input id="pg-monto" type="number" placeholder="0" value="${existing?existing.monto:''}"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      ${existing?`<button class="btn btn-danger" onclick="borrarPresupGasto(${oid},'${rubro.replace(/'/g,"\\'")}')">Borrar</button>`:''}
      <button class="btn btn-primary" onclick="savePresupGasto(${oid},'${rubro.replace(/'/g,"\\'")}')">Guardar</button>
    </div>`;
  bg.classList.add('open');
}

function savePresupGasto(oid, rubro){
  if(!data.presupuesto_gasto_rubro)data.presupuesto_gasto_rubro=[];
  const monto=parseFloat(document.getElementById('pg-monto').value)||0;
  const idx=data.presupuesto_gasto_rubro.findIndex(p=>p.obraId===oid&&p.rubro===rubro);
  if(idx>=0){data.presupuesto_gasto_rubro[idx].monto=monto;}
  else{data.presupuesto_gasto_rubro.push({obraId:oid,rubro,monto});}
  save();closeModal();renderSubTabGastoRubro();showToast('✓ Presupuesto guardado');
}

function borrarPresupGasto(oid, rubro){
  if(!confirm('¿Eliminar el presupuesto de este rubro?'))return;
  data.presupuesto_gasto_rubro=(data.presupuesto_gasto_rubro||[]).filter(p=>!(p.obraId===oid&&p.rubro===rubro));
  save();closeModal();renderSubTabGastoRubro();showToast('Eliminado');
}

function previewCuotas(tid){
  const t=data.tablasHon.find(x=>x.id===tid);
  const total=parseFloat(($('f-gen-total')||{}).value)||0;
  const cant=parseInt(($('f-gen-cant')||{}).value)||1;
  const mes=gv('f-gen-mes');
  const dia=parseInt(($('f-gen-dia')||{}).value)||1;
  const anticipo=gv('f-gen-anticipo')==='si';
  const nombre=gv('f-gen-nombre')||'CUOTA';
  const prev=$('gen-preview');if(!prev)return;
  if(!total||!mes){prev.innerHTML='<span style="color:#aaa">Completá los campos para ver la vista previa.</span>';return;}
  const montoCuota=Math.round(total/cant*100)/100;
  const fmt2=t&&t.moneda==='USD'?fmtUSD:fmtARS;
  let rows=`<div style="font-weight:700;margin-bottom:8px;color:#333">${cant} cuota${cant>1?'s':''} de ${fmt2(montoCuota)} c/u</div>`;
  for(let i=0;i<cant;i++){
    const d=new Date(mes+'-02');d.setMonth(d.getMonth()+i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),ds=String(Math.min(dia,28)).padStart(2,'0');
    const label=anticipo&&i===0?'ANTICIPO':`${nombre} ${anticipo?i:i+1}`;
    rows+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #ece9e0">
      <span style="font-weight:600">${label}</span><span>${fmt2(montoCuota)} — vence ${y}-${m}-${ds}</span></div>`;
  }
  prev.innerHTML=rows;
}
function generarCuotas(tid){
  const t=data.tablasHon.find(x=>x.id===tid);if(!t)return;
  const total=parseFloat(($('f-gen-total')||{}).value)||0;
  const cant=parseInt(($('f-gen-cant')||{}).value)||1;
  const mes=gv('f-gen-mes');
  const dia=parseInt(($('f-gen-dia')||{}).value)||1;
  const anticipo=gv('f-gen-anticipo')==='si';
  const nombre=gv('f-gen-nombre')||'CUOTA';
  if(!total)return alert('Ingresá el monto total');
  if(!mes)return alert('Seleccioná el primer mes');
  const montoCuota=Math.round(total/cant*100)/100;
  t.cuotas=[];
  for(let i=0;i<cant;i++){
    const d=new Date(mes+'-02');d.setMonth(d.getMonth()+i);
    const y=d.getFullYear(),m2=String(d.getMonth()+1).padStart(2,'0'),ds=String(Math.min(dia,28)).padStart(2,'0');
    const label=anticipo&&i===0?'ANTICIPO':`${nombre} ${anticipo?i:i+1}`;
    t.cuotas.push({id:data.nextId.cuota++,nombre:label,monto:montoCuota,
      fecha:`${y}-${m2}-${ds}`,pagado:false,fechaPago:'',formaPago:'',indiceCAC:null});
  }
  save();closeModal();renderTablaHon();showToast('✓ '+cant+' cuotas generadas');
}
function delCuota(tid,cid){
  if(!confirm('¿Eliminar esta cuota?'))return;
  const t=data.tablasHon.find(x=>x.id===tid);if(!t)return;
  t.cuotas=t.cuotas.filter(x=>x.id!==cid);
  save();renderTablaHon();
}
function delTablaHon(tid){
  if(!confirm('¿Eliminar esta tabla y todas sus cuotas?'))return;
  data.tablasHon=data.tablasHon.filter(x=>x.id!==tid);
  save();renderTablaHon();
}
function saveTablaHon(id){
  const oid=parseInt(gv('f-obra'));if(!oid)return alert('Seleccioná una obra');

  const obj={obraId:oid,tipo:gv('f-tipo'),desc,moneda:gv('f-moneda'),totalHonorario:total,
    porcMat,porcIgn,

  if(id){Object.assign(data.tablasHon.find(x=>x.id===id),obj);}
  else{data.tablasHon.push({id:data.nextId.tablaHon++,cuotas:[],...obj});}
  save();closeModal();renderTablaHon();showToast('✓ Guardado');
}
function saveCuota(tid,cid){
  const t=data.tablasHon.find(x=>x.id===tid);if(!t)return;
  const nombre=gv('f-nombre');if(!nombre)return alert('Ingresá el nombre de la cuota');
  const monto=parseFloat($('f-monto').value)||0;if(!monto)return alert('Ingresá el monto');
  const obj={nombre,monto,fecha:gv('f-fecha'),
    pagado:gv('f-estado')==='cobrado',
    fechaPago:gv('f-fechapago')||'',
    formaPago:gv('f-fp')||'',
    indiceCAC:parseFloat($('f-cuota-cac').value)||null};
  if(cid){Object.assign(t.cuotas.find(x=>x.id===cid),obj);}

}

function savePagoClienteConProp(oid,eid){
  const monto=parseFloat((document.getElementById('f-monto')||{}).value)||0;
  if(!monto)return alert('Ingresá el monto');
  const prop=(document.getElementById('f-prop-pc')||{}).value||'general';
  const fecha=gv('f-fecha')||today();
  const socio=gv('f-socio')||MAT;
  const fp=gv('f-fp')||'Efectivo';
  const desc=gv('f-item')||'';
  if(prop==='caja_chica'||prop==='mano_obra'){
    // Guardar como fondo
    if(!data.fondos)data.fondos=[];
    if(!data.nextId.fondo)data.nextId.fondo=1;
  if(!data.pagos_directos)data.pagos_directos=[];
  if(!data.cuotas_mo)data.cuotas_mo=[];
  if(!data.nextId.pagodirecto)data.nextId.pagodirecto=1;
  if(!data.nextId.cuotamo)data.nextId.cuotamo=1;
    // Si editamos un pago general (eid existe y está en data.caja), lo eliminamos y creamos un fondo
    if(eid){
      const existeFondo=(data.fondos||[]).find(f=>f.id===eid);
      if(existeFondo){
        // Es un fondo existente — actualizarlo no aplica aquí (eso es para editar-fondo)
        // En caja-mov-pc nuevo siempre creamos
      } else {
        // Era un pago general — borrar de data.caja
        data.caja=data.caja.filter(m=>m.id!==eid);
      }
    }
    data.fondos.push({id:data.nextId.fondo++,obraId:parseInt(oid),tipo:prop,monto,fecha,desc,formaPago:fp,socio});
  } else {
    // General: guardar en data.caja
    const obj={obraId:parseInt(oid),tipo:'pago_cliente',fecha,socio,item:desc,rubro:'Pago cliente',obs:'',monto,valorDolar:0,formaPago:fp};
    if(eid){
      const existeFondo=(data.fondos||[]).find(f=>f.id===eid);
      if(existeFondo){
        // Era un fondo — borrarlo y crear pago general
        data.fondos=data.fondos.filter(f=>f.id!==eid);
        data.caja.push({id:data.nextId.caja++,...obj});
      } else {
        Object.assign(data.caja.find(x=>x.id===eid),obj);
      }
    } else {
      data.caja.push({id:data.nextId.caja++,...obj});
    }
  }
  save();closeModal();renderCajaDetalle();showToast('✓ Pago del cliente registrado');
}

function imprimirManoObra(oid){
  const obra=getObra(oid);
  const cliente=getCliente(obra.clienteId);
  const fondosMO=(data.fondos||[]).filter(f=>f.obraId===oid&&f.tipo==='mano_obra');
  const pagos=data.caja.filter(m=>m.obraId===oid&&m.tipo==='mano_obra').sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const totFMO=fondosMO.reduce((a,f)=>a+f.monto,0);
  const totPagado=pagos.reduce((a,m)=>a+m.monto,0);
  const saldo=totFMO-totPagado;
  const fecha=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const rubros=[...new Set(pagos.map(m=>m.rubro).filter(Boolean))];
  const rubrosResumen=rubros.map(r=>({
    rubro:r,
    total:pagos.filter(m=>m.rubro===r).reduce((a,m)=>a+m.monto,0),
    cant:pagos.filter(m=>m.rubro===r).length
  })).sort((a,b)=>b.total-a.total);

  const html=`

function imprimirPlanillaCliente(oid){
